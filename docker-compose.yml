services:
  postgres:
    image: postgres:16
    container_name: comment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - comment_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5434:5432"

  redis:
    image: redis:7
    restart: unless-stopped

  comment-service:
    build: .
    container_name: comment-service
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SSLMODE: disable
      REDIS_ADDR: ${REDIS_ADDR}
    volumes:
      - ./keys/public.pem:/app/keys/public.pem:ro
    ports:
      - "8082:8080"


volumes:
  comment_pgdata: